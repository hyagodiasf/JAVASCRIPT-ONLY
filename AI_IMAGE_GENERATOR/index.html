<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ai Image Generator</title>
    <!--Linking Font Awesome for icons-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div class="logo-wrapper">
          <div class="logo">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
          </div>
          <h1>Gerador de Imagem - IA</h1>
        </div>

        <button class="theme-toggle">
          <i class="fa-solid fa-moon"></i>
        </button>
      </header>

      <div class="main-content">
        <form action="#" class="prompt-form">
          <div class="prompt-container">
            <textarea
              class="prompt-input"
              placeholder="Descreva sua imaginação..."
              required
              autofocus
            ></textarea>

            <button type="button" class="prompt-btn">
              <i class="fa-solid fa-dice"></i>
            </button>
          </div>
          <div class="prompt-actions">
            <div class="select-wrapper">
              <select class="custom-select required">
                <option value="" selected disabled>Selecione o modelo</option>
                <option value="black-forest-labs/FLUX.1-schnell">
                  FLUX.1-dev
                </option>
                <option value="black-forest-labs/FLUX.1-schnell">
                  FLUX.1-schnell
                </option>
                <option value="stabilityai/stable-diffusin-xl-base-1.0">
                  Stable Diffusion XL
                </option>
                <option value="runwayml/stable-diffusion-v1-5">
                  Stable Diffusion v1.5
                </option>
                <option value="prompthero/openjourney">Openjourney</option>
              </select>
            </div>
            <div class="select-wrapper">
              <select class="custom-select required">
                <option value="" selected disabled>Contagem de Imagem</option>
                <option value="1">1 Image</option>
                <option value="2">2 Image</option>
                <option value="3">3 Image</option>
                <option value="4">4 Image</option>
              </select>
            </div>
            <div class="select-wrapper">
              <select class="custom-select required">
                <option value="" selected disabled>Proporção</option>
                <option value="1/1">Square</option>
                <option value="16/9">Landscape</option>
                <option value="9/16">Portrait (9:16)</option>
              </select>
            </div>
            <button type="submit" class="generate-btn">
              <i class="fa-solid fa-wand-sparkles"></i>
              Gerar
            </button>
          </div>

          <div class="gallery-grid">
            <div class="img-card">
              <img src="test.png" alt="" class="result-img" />
              <div class="img-overlay">
                <button class="img-download-btn">
                  <i class="fa-solid fa-download"></i>
                </button>
              </div>
            </div>             
          </div>
          <div class="gallery-grid">
            <div class="img-card">
              <img src="test.png" alt="" class="result-img" />
              <div class="img-overlay">
                <button class="img-download-btn">
                  <i class="fa-solid fa-download"></i>
                </button>
              </div>
            </div>             
          </div>
          <div class="gallery-grid">
            <div class="img-card">
              <img src="test.png" alt="" class="result-img" />
              <div class="img-overlay">
                <button class="img-download-btn">
                  <i class="fa-solid fa-download"></i>
                </button>
              </div>
            </div>             
          </div>
          <div class="gallery-grid">
            <div class="img-card">
              <img src="test.png" alt="" class="result-img" />
              <div class="img-overlay">
                <button class="img-download-btn">
                  <i class="fa-solid fa-download"></i>
                </button>
              </div>
            </div>             
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
